services:
  ms-producto-03:
    image: ms-producto:03
    container_name: ms-producto-03
    ports:
      - "8087:8086"
    environment:
      - URL=jdbc:postgresql://postgres12:5432/curso
      - USER_DB=postgres
      - PASS_DB=123456
      - PORT=8082
      - JAVA_OPTS=-Xms256 -Xmx900m
    networks:
      - curso
    restart: unless-stopped
  postgres12:
    image: postgres:12.20-alpine3.20
    container_name: postgres12
    environment:
      - POSTGRES_PASSWORD=123456
      - POSTGRES_USER=postgres
      - POSTGRES_DB=curso
    ports:
      - "5434:5432"
    networks:
      - curso
    restart: always
networks:
  curso:
    external: true
