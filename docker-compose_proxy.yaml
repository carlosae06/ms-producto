services:
  postgres12:
    image: postgres:12.20-alpine3.20
    container_name: postgres12
    environment:
      - POSTGRES_PASSWORD=123456
      - POSTGRES_USER=postgres
      - POSTGRES_DB=curso
    networks:
      - curso
    restart: unless-stopped
  ms-producto-03:
    image: ms-producto-run
    container_name: ms-producto-03
    environment:
      - URL=jdbc:postgresql://postgres12:5432/curso
      - USER_DB=postgres
      - PASS_DB=123456
      - PORT=8082
    networks:
      - curso
    restart: always
    depends_on:
      - postgres12
  nginx:
    container_name: proxy
    image: nginx:latest
    ports:
      - "8443:443"
    volumes:
      - ./nginx/tls:/etc/nginx/certs/
    depends_on:
      - ms-producto-03
networks:
  curso:
    driver: bridge
